name: 'SBOM Generate'
description: |
  Generates a Software Bill of Materials (SBOM) using Syft in CycloneDX JSON
  format. The SBOM captures all declared dependencies and their resolved
  versions at build time. Uploads the SBOM as a build artifact.

inputs:
  path:
    description: 'Path to scan for SBOM generation (module or package directory).'
    required: true
    default: '.'
  output-file:
    description: 'Path to write the SBOM (CycloneDX JSON).'
    required: false
    default: 'sbom.cdx.json'
  artifact-name:
    description: 'Name for the uploaded GitHub Actions artifact.'
    required: false
    default: 'sbom'
  upload-artifact:
    description: 'Whether to upload the SBOM as a GitHub Actions artifact.'
    required: false
    default: 'true'
  syft-version:
    description: 'Version of Syft to install. Pin this for reproducible builds.'
    required: false
    default: '1.28.0'

outputs:
  sbom-path:
    description: 'Path to the generated SBOM file.'
    value: ${{ inputs.output-file }}

runs:
  using: 'composite'
  steps:
    - name: Install Syft
      shell: bash
      run: |
        SYFT_VERSION="${{ inputs.syft-version }}"
        if command -v syft &> /dev/null && syft version | grep -q "$SYFT_VERSION"; then
          echo "Syft $SYFT_VERSION already installed."
        else
          echo "Installing Syft $SYFT_VERSION..."
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin "v$SYFT_VERSION"
        fi
        echo "Syft version: $(syft version)"

    - name: Generate SBOM
      shell: bash
      run: |
        echo "Generating SBOM for: ${{ inputs.path }}"
        syft dir:"${{ inputs.path }}" \
          --output cyclonedx-json="${{ inputs.output-file }}" \
          --quiet

        if [ -f "${{ inputs.output-file }}" ]; then
          COMPONENT_COUNT=$(python3 -c "
        import json
        with open('${{ inputs.output-file }}') as f:
            sbom = json.load(f)
        components = sbom.get('components', [])
        print(len(components))
        " 2>/dev/null || echo "unknown")
          echo "SBOM generated: ${{ inputs.output-file }}"
          echo "Components catalogued: $COMPONENT_COUNT"
        else
          echo "::error::SBOM generation failed — output file not created."
          exit 1
        fi

    - name: Upload SBOM artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-name }}
        path: ${{ inputs.output-file }}
        retention-days: 90
