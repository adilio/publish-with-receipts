name: 'Provenance Generate'
description: |
  Generates a SLSA-style provenance attestation for a build artifact.
  Records: source repo, commit SHA, workflow reference, build timestamp,
  runner environment, and hashes of the output artifact(s).
  Uploads the provenance document as a GitHub Actions artifact.

  For stronger attestations (signed, verifiable with slsa-verifier),
  use the slsa-framework/slsa-github-generator instead of this action.
  This action is designed as a lightweight, dependency-free alternative
  for teams that want provenance without the complexity of SLSA level 2+.

inputs:
  artifact-path:
    description: 'Path to the artifact file to generate provenance for.'
    required: true
  artifact-name:
    description: 'Human-readable name for the artifact (e.g., ExampleModule 1.2.0).'
    required: true
  sbom-path:
    description: 'Path to the SBOM file to include a reference to in the provenance.'
    required: false
    default: ''
  provenance-output:
    description: 'Path to write the provenance JSON document.'
    required: false
    default: 'provenance.json'
  upload-artifact:
    description: 'Whether to upload the provenance document as a GitHub Actions artifact.'
    required: false
    default: 'true'
  artifact-upload-name:
    description: 'Name for the uploaded GitHub Actions artifact.'
    required: false
    default: 'provenance'

outputs:
  provenance-path:
    description: 'Path to the generated provenance document.'
    value: ${{ inputs.provenance-output }}
  artifact-sha256:
    description: 'SHA256 hash of the artifact.'
    value: ${{ steps.generate.outputs.artifact-sha256 }}

runs:
  using: 'composite'
  steps:
    - name: Generate provenance document
      id: generate
      shell: pwsh
      run: |
        $artifactPath     = '${{ inputs.artifact-path }}'
        $artifactName     = '${{ inputs.artifact-name }}'
        $provenanceOutput = '${{ inputs.provenance-output }}'
        $sbomPath         = '${{ inputs.sbom-path }}'

        if (-not (Test-Path $artifactPath)) {
          Write-Error "Artifact not found: $artifactPath"
          exit 1
        }

        # Compute artifact hash and size
        if (Test-Path $artifactPath -PathType Leaf) {
          $sha256       = (Get-FileHash -Algorithm SHA256 $artifactPath).Hash.ToLower()
          $artifactSize = (Get-Item $artifactPath).Length
        } else {
          # For directories, hash all files in deterministic order then hash the combined result
          $allHashes = Get-ChildItem -Path $artifactPath -Recurse -File |
            Sort-Object FullName |
            ForEach-Object { (Get-FileHash -Algorithm SHA256 $_.FullName).Hash }
          $combined     = $allHashes -join "`n"
          $stream       = [System.IO.MemoryStream]::new([System.Text.Encoding]::UTF8.GetBytes($combined))
          $sha256       = (Get-FileHash -Algorithm SHA256 -InputStream $stream).Hash.ToLower()
          $stream.Dispose()
          $artifactSize = (Get-ChildItem -Path $artifactPath -Recurse -File |
            Measure-Object -Property Length -Sum).Sum
        }

        Write-Host "Artifact SHA256: $sha256"
        "artifact-sha256=$sha256" >> $env:GITHUB_OUTPUT

        # Compute SBOM hash if provided
        $sbomDigest = ''
        if ($sbomPath -and (Test-Path $sbomPath)) {
          $sbomDigest = (Get-FileHash -Algorithm SHA256 $sbomPath).Hash.ToLower()
        }

        $timestamp = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')

        $provenance = [ordered]@{
          '_type'         = 'https://in-toto.io/Statement/v0.1'
          'subject'       = @(
            [ordered]@{
              'name'   = $artifactName
              'digest' = [ordered]@{ 'sha256' = $sha256 }
            }
          )
          'predicateType' = 'https://slsa.dev/provenance/v0.2'
          'predicate'     = [ordered]@{
            'builder'     = [ordered]@{
              'id' = "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
            'buildType'   = 'https://github.com/actions/workflow@v1'
            'invocation'  = [ordered]@{
              'configSource' = [ordered]@{
                'uri'        = "git+https://github.com/${{ github.repository }}@${{ github.ref }}"
                'digest'     = [ordered]@{ 'sha1' = '${{ github.sha }}' }
                'entryPoint' = '${{ github.workflow }}'
              }
              'parameters'   = [ordered]@{
                'event'    = '${{ github.event_name }}'
                'ref'      = '${{ github.ref }}'
                'workflow' = '${{ github.workflow }}'
              }
              'environment'  = [ordered]@{
                'github_run_id'      = '${{ github.run_id }}'
                'github_run_number'  = '${{ github.run_number }}'
                'github_run_attempt' = '${{ github.run_attempt }}'
                'runner_os'          = '${{ runner.os }}'
                'runner_arch'        = '${{ runner.arch }}'
              }
            }
            'buildConfig' = @{}
            'metadata'    = [ordered]@{
              'buildInvocationId' = '${{ github.run_id }}-${{ github.run_attempt }}'
              'buildStartedOn'    = $timestamp
              'completeness'      = [ordered]@{
                'parameters'  = $true
                'environment' = $true
                'materials'   = $false
              }
              'reproducible' = $false
            }
            'materials'   = @(
              [ordered]@{
                'uri'    = "git+https://github.com/${{ github.repository }}"
                'digest' = [ordered]@{ 'sha1' = '${{ github.sha }}' }
              }
            )
          }
          'attestation_metadata' = [ordered]@{
            'generated_by'        = 'publish-with-receipts/provenance-generate'
            'generated_at'        = $timestamp
            'artifact_path'       = $artifactPath
            'artifact_size_bytes' = $artifactSize
          }
        }

        if ($sbomDigest) {
          $provenance.attestation_metadata['sbom_digest'] = $sbomDigest
        }

        $provenance | ConvertTo-Json -Depth 20 | Out-File -FilePath $provenanceOutput -Encoding utf8
        Write-Host "Provenance written to: $provenanceOutput"

    - name: Upload provenance artifact
      if: inputs.upload-artifact == 'true'
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      with:
        name: ${{ inputs.artifact-upload-name }}
        path: ${{ inputs.provenance-output }}
        retention-days: 365
