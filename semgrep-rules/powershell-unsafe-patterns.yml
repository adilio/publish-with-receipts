rules:

  # ---------------------------------------------------------------------------
  # RULE: Download-and-execute pattern
  # Detects scripts that fetch remote content and execute it via Invoke-Expression.
  # This is the canonical supply chain attack vector for PowerShell: an attacker
  # who controls the remote endpoint can execute arbitrary code.
  # ---------------------------------------------------------------------------
  - id: powershell-download-execute
    pattern-either:
      - pattern: |
          $... = Invoke-WebRequest ...
          ...
          Invoke-Expression $...
      - pattern: |
          $... = Invoke-RestMethod ...
          ...
          Invoke-Expression $...
      - pattern: |
          $... = irm ...
          ...
          Invoke-Expression $...
      - pattern: |
          $... = irm ...
          ...
          IEX $...
      - pattern: |
          Invoke-Expression (Invoke-WebRequest ...)
      - pattern: |
          Invoke-Expression (Invoke-RestMethod ...)
      - pattern: |
          IEX (Invoke-WebRequest ...)
      - pattern: |
          IEX (IWR ...)
      - pattern: |
          IEX (irm ...)
    message: |
      Download-and-execute pattern detected. The result of a web request is being
      passed to Invoke-Expression, which executes it as PowerShell code. An attacker
      who controls the remote URL or the server can execute arbitrary code in the
      context of the calling user. Use local scripts verified against a known hash
      instead of fetching and executing remote content.
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      confidence: HIGH
      references:
        - https://owasp.org/www-community/attacks/Code_Injection

  # ---------------------------------------------------------------------------
  # RULE: Hardcoded secrets — API keys and tokens
  # Matches common patterns for hardcoded credentials assigned to variables.
  # ---------------------------------------------------------------------------
  - id: powershell-hardcoded-secret
    pattern-either:
      - patterns:
          - pattern: $ApiKey = "..."
          - pattern-not: $ApiKey = $env:...
      - patterns:
          - pattern: $Token = "..."
          - pattern-not: $Token = $env:...
      - patterns:
          - pattern: $Secret = "..."
          - pattern-not: $Secret = $env:...
      - patterns:
          - pattern: $Password = "..."
          - pattern-not: $Password = $env:...
      - patterns:
          - pattern: $AccessKey = "..."
          - pattern-not: $AccessKey = $env:...
      - patterns:
          - pattern: $ClientSecret = "..."
          - pattern-not: $ClientSecret = $env:...
    message: |
      Potential hardcoded secret detected. Credentials, API keys, and tokens should
      never be stored in source code. Use environment variables, GitHub Actions
      secrets, Azure Key Vault, or another secrets management solution. Hardcoded
      secrets committed to public repositories are frequently harvested by automated
      scanners and can compromise production systems.
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # RULE: Disable TLS/certificate validation
  # Matches overrides to ServerCertificateValidationCallback that accept all certs.
  # This opens any subsequent HTTPS connection to MITM attacks.
  # ---------------------------------------------------------------------------
  - id: powershell-disable-certificate-validation
    pattern: |
      [System.Net.ServicePointManager]::ServerCertificateValidationCallback = { $true }
    message: |
      TLS certificate validation is being disabled by setting
      ServerCertificateValidationCallback to always return $true. This allows
      man-in-the-middle attacks against any HTTPS connection made in this session.
      Remove this line and ensure your endpoints present valid, trusted certificates.
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-295: Improper Certificate Validation"
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # RULE: Base64 encoded command execution
  # Matches -EncodedCommand invocations and manual base64-decode-and-execute.
  # Encoding is a common obfuscation technique used to hide malicious payloads.
  # ---------------------------------------------------------------------------
  - id: powershell-encoded-command
    pattern-either:
      - pattern: |
          powershell.exe -EncodedCommand ...
      - pattern: |
          powershell -EncodedCommand ...
      - pattern: |
          pwsh -EncodedCommand ...
      - pattern: |
          powershell.exe -enc ...
      - pattern: |
          Invoke-Expression ([Text.Encoding]::Unicode.GetString([Convert]::FromBase64String(...)))
    message: |
      Base64-encoded command execution detected. Using -EncodedCommand or manually
      decoding base64 to execute commands is a common obfuscation technique. While
      there are legitimate uses (e.g., passing complex arguments), this pattern
      should be reviewed and suppressed with a justification comment if intentional.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-116: Improper Encoding or Escaping of Output"
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # RULE: Invoke-Expression usage
  # Broad catch for any use of Invoke-Expression or its alias IEX.
  # Lower severity than download-execute since there are legitimate uses.
  # ---------------------------------------------------------------------------
  - id: powershell-invoke-expression
    pattern-either:
      - pattern: Invoke-Expression ...
      - pattern: IEX ...
    message: |
      Invoke-Expression (IEX) executes a string as PowerShell code at runtime.
      If any part of the string comes from user input, network responses, or
      environment variables, this is a code injection risk. Prefer direct
      function calls or script blocks over dynamic string execution.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      confidence: LOW

  # ---------------------------------------------------------------------------
  # RULE: ScriptsToProcess in module manifest
  # Detects use of ScriptsToProcess which runs scripts in the caller's scope
  # before module import — the same mechanism used in typosquatting attacks.
  # ---------------------------------------------------------------------------
  - id: powershell-scripts-to-process
    pattern: |
      ScriptsToProcess = @(...)
    message: |
      ScriptsToProcess in a module manifest causes listed scripts to run in the
      caller's session scope before the module is imported. This mechanism was
      used by Aqua Security researchers in a PowerShell Gallery typosquatting
      proof-of-concept (2023) to execute code at import time. Unless explicitly
      required, prefer dot-sourcing scripts from within the module's .psm1 file.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      confidence: HIGH
      references:
        - https://blog.aquasec.com/typosquatting-attacks-on-powershell-gallery

  # ---------------------------------------------------------------------------
  # RULE: Invoke-WebRequest without -UseBasicParsing on older PowerShell
  # Minor quality/reliability issue that also indicates unfamiliarity with
  # cross-platform PowerShell; included as a low-severity informational rule.
  # ---------------------------------------------------------------------------
  - id: powershell-webrequest-basic-parsing
    patterns:
      - pattern: |
          Invoke-WebRequest -Uri ...
      - pattern-not: |
          Invoke-WebRequest -Uri ... -UseBasicParsing
    message: |
      Consider adding -UseBasicParsing to Invoke-WebRequest calls for
      cross-platform compatibility and to avoid IE first-run errors in
      non-interactive sessions. On PowerShell 6+, this is the default,
      but it should be explicit for 5.1 compatibility.
    severity: INFO
    languages: [generic]
    metadata:
      category: maintainability
      confidence: LOW

  # ---------------------------------------------------------------------------
  # RULE: Dynamic type compilation via Add-Type
  # Add-Type -TypeDefinition with a variable value means C# code is being
  # compiled at runtime from a potentially controlled string. If the string
  # originates from user input or a network response, this is code injection.
  # ---------------------------------------------------------------------------
  - id: powershell-add-type-dynamic
    pattern-either:
      - pattern: |
          Add-Type -TypeDefinition $...
      - pattern: |
          Add-Type -TypeDefinition ($... + ...)
    message: |
      Add-Type -TypeDefinition is compiling C# code from a runtime string.
      If the string value is influenced by user input, environment variables,
      or network content, this is a code injection vector. Prefer embedding
      C# source as a literal here-string rather than assembling it at runtime.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code"
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # RULE: Assembly loading from a dynamic path
  # [System.Reflection.Assembly]::Load / LoadFrom / LoadFile with a variable
  # path can load arbitrary DLLs, including those placed by an attacker.
  # ---------------------------------------------------------------------------
  - id: powershell-assembly-load-dynamic
    pattern-either:
      - pattern: |
          [System.Reflection.Assembly]::Load($...)
      - pattern: |
          [System.Reflection.Assembly]::LoadFrom($...)
      - pattern: |
          [System.Reflection.Assembly]::LoadFile($...)
      - pattern: |
          [Reflection.Assembly]::Load($...)
      - pattern: |
          [Reflection.Assembly]::LoadFrom($...)
    message: |
      Dynamic assembly loading detected. Loading assemblies from a variable path
      at runtime can execute untrusted code if the path is attacker-controlled
      (e.g., DLL planting in a writable directory). Ensure the assembly path is
      validated against a known, trusted location and the loaded binary is
      verified against an expected hash before loading.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-114: Process Control"
      confidence: MEDIUM

  # ---------------------------------------------------------------------------
  # RULE: BITS transfer without hash verification
  # Start-BitsTransfer is a legitimate download mechanism but is less commonly
  # checked for integrity than IWR-based downloads. The file should be hashed
  # after transfer and compared to a known-good value.
  # ---------------------------------------------------------------------------
  - id: powershell-bits-transfer-no-verify
    pattern-either:
      - pattern: |
          Start-BitsTransfer -Source $... -Destination $dest
          ...
          & $dest
      - pattern: |
          Start-BitsTransfer -Source "..." -Destination $dest
          ...
          Start-Process $dest
    message: |
      A file downloaded via Start-BitsTransfer is being executed without
      explicit integrity verification. Compute the SHA256 hash of the downloaded
      file and compare it to a known-good value before executing it.
    severity: ERROR
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-494: Download of Code Without Integrity Check"
      confidence: HIGH

  # ---------------------------------------------------------------------------
  # RULE: Unpinned RequiredModules in module manifest (.psd1)
  # A bare module name with no version constraint is a floating dependency —
  # any version can be resolved, including a newly-published malicious one.
  # ---------------------------------------------------------------------------
  - id: powershell-unpinned-required-module
    pattern-either:
      - pattern: |
          RequiredModules = @( '...' )
      - pattern: |
          RequiredModules = @( "..." )
    message: |
      RequiredModules contains a bare module name with no version constraint.
      Any version of this module will be resolved at install time, including
      future versions that may contain malicious changes or break compatibility.
      Use @{ ModuleName = 'Name'; RequiredVersion = '1.2.3' } for an exact pin,
      or ModuleVersion + MaximumVersion for a bounded range.
    severity: WARNING
    languages: [generic]
    metadata:
      category: security
      cwe: "CWE-1104: Use of Unmaintained Third-Party Components"
      confidence: MEDIUM
      references:
        - https://learn.microsoft.com/en-us/powershell/scripting/developer/module/how-to-write-a-powershell-module-manifest
