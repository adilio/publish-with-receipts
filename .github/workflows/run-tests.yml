name: Test Suite

on:
  push:
    branches: [main, master]
    paths:
      - 'tests/**'
      - 'examples/powershell-module/**'
      - 'semgrep-rules/**'
      - 'actions/**'
      - 'scripts/**'
      - '.github/workflows/run-tests.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'tests/**'
      - 'examples/powershell-module/**'
      - 'semgrep-rules/**'
      - 'actions/**'
      - 'scripts/**'
      - '.github/workflows/run-tests.yml'
  workflow_dispatch:

permissions:
  contents: read
  checks: write        # For publishing test results as PR checks

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests — no external tool dependencies
  # Fast; runs on every push/PR.
  # Matrix covers PowerShell 7 (pwsh on Linux) and Windows PowerShell 5.1
  # to verify cross-platform compatibility of action scripts.
  # ---------------------------------------------------------------------------
  unit-tests:
    name: Unit Tests (${{ matrix.ps_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: pwsh
            ps_label: PowerShell 7
          - os: windows-latest
            shell: powershell
            ps_label: Windows PowerShell 5.1

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        shell: ${{ matrix.shell }}
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Run unit tests
        shell: ${{ matrix.shell }}
        run: |
          ./tests/Run-Tests.ps1 -Scope unit -OutputFormat Detailed -JUnitOutput ./unit-test-results.xml

      - name: Publish unit test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: unit-test-results-${{ matrix.os }}
          path: unit-test-results.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Integration tests — requires PSScriptAnalyzer and Semgrep
  # ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run integration tests
        shell: pwsh
        run: |
          ./tests/Run-Tests.ps1 -Scope integration -OutputFormat Detailed -JUnitOutput ./integration-test-results.xml

      - name: Run Semgrep rule tests (semgrep --test)
        run: semgrep --test semgrep-rules/

      - name: Publish integration test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: integration-test-results
          path: integration-test-results.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Module functional tests — Pester tests for ExampleModule
  # Requires Az.Accounts (installs during the step).
  # Matrix covers PowerShell 7 and Windows PowerShell 5.1 — the module must
  # load and export correctly on both runtimes.
  # ---------------------------------------------------------------------------
  module-tests:
    name: Module Functional Tests (${{ matrix.ps_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: pwsh
            ps_label: PowerShell 7
          - os: windows-latest
            shell: powershell
            ps_label: Windows PowerShell 5.1

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester and dependencies
        shell: ${{ matrix.shell }}
        run: |
          Install-Module Pester       -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser
          Install-Module Az.Accounts  -Force -SkipPublisherCheck -Scope CurrentUser -AllowClobber

      - name: Run module functional tests
        shell: ${{ matrix.shell }}
        run: |
          $result = Invoke-Pester -Path examples/powershell-module/tests -PassThru -Output Detailed
          if ($result.FailedCount -gt 0) {
            Write-Error "Module tests: $($result.FailedCount) test(s) failed."
            exit 1
          }

  # ---------------------------------------------------------------------------
  # E2E tests — run Invoke-LocalValidation.ps1
  # Requires PSScriptAnalyzer and Semgrep; skips Syft/Grype steps.
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -SkipPublisherCheck -Scope CurrentUser

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run e2e tests
        shell: pwsh
        run: |
          ./tests/Run-Tests.ps1 -Scope e2e -OutputFormat Detailed -JUnitOutput ./e2e-test-results.xml

      - name: Publish e2e test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: e2e-test-results
          path: e2e-test-results.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Summary job — fails if any test job fails
  # ---------------------------------------------------------------------------
  all-tests-pass:
    name: All Tests Passed
    needs: [unit-tests, integration-tests, module-tests, e2e-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.unit-tests.result }}" != "success" ]]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [[ "${{ needs.module-tests.result }}" != "success" ]]; then
            echo "Module tests failed"
            exit 1
          fi
          if [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All test jobs passed."
